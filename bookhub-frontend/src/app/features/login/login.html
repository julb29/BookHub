<main class="container login-wrapper">
  <article>
    <h2>Bienvenue sur Bookhub</h2>

    <form (ngSubmit)="login()">
      <label for="email">
        Email
        <input type="text" id="email" name="email" [(ngModel)]="email" required />
      </label>

      <label for="password">
        Mot de passe
        <input type="password" id="password" name="password" [(ngModel)]="password" required />
      </label>

      <button type="submit">Accéder à votre compte</button>
    </form>
  </article>
</main>
