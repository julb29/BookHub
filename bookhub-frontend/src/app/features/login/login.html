<h1>Bienvenue sur Bookhub, votre bibliothèque communautaire !</h1>

<form (ngSubmit)="login()">
  <label for="email">Email</label>
  <input type="text" id="email" name="email" [(ngModel)]="email">

  <label for="password">Mot de passe</label>
  <input type="password" id="password" name="password" [(ngModel)]="password">

  <button type="submit">Accéder à votre compte</button>
</form>
